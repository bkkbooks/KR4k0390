body:
  text: 蕭方等三十國春秋懷帝魏嘉平元年魏帝謁陵曹爽及弟羲訓彥皆從高祖命授兵召公卿於廟堂奏皇太后廢爽丁酉斬爽羲訓彥夷三族御覽六百四十七文帝器重魏舒而舒不為人知晉吏部郎魏衡謂姪舒曰汝後得為小縣長舒曰堪為八百戶長將老嫂入官舍即斯願畢矣御覽五百十七鍾會薦於文帝曰裴楷清通裴楷常建為別宅宅甚美麗楷兄欲之楷別讓之其性有大度皆斯類也御覽五百十六泰始四年策免石苞官通鑑考異晉記五年二月以羊祜都督荊州鎮襄陽時祜有平吳之志方樹基址濯王濬為巴郡太守將委以巴峽之任祜兄子暨謂祜曰觀濬為人志大者侈不可專任祜曰有大才必可用也識者曰祜可謂能舉善矣知人則哲叔子之謂乎御覽五百十二晉泰始五年夏四月地震大疫上命醫以駟馬小車馳救療書鈔醫類泰始七年吳建衡三年吳孟仁卒吳司徒孟宗少從南陽李肅學母為作厚褥大被或問故曰小兒無德可容而學者多貧故為廣被可得氣類相接也御覽五百十一泰始八年二月以賈充為都督秦涼二州事通鑑考異晉紀八年十一月賈充與朝士宴飲庾純醉與充爭言詔免純官通鑑考異晉紀八年衛瓘以太子昏愚不堪為嗣欲啓而未敢同上咸寧元年孫皓納張布女有寵而死厚葬之民有訛言遂誅奚熙并殺章安侯奪同上四年吳收長尚岑昏等泥頭請代尚死尚得免死徙廣州同上四年羊祜卒羊祜年十五而孤事伯母蔡氏以孝聞蔡氏每歎曰羊叔子可謂能養今顏叔子也其諸葛孔明之亞乎御覽五百十三五年十一月晉大舉伐吳吳王皓聞師之將興也乃使劉恪守牛渚使張悌造攻車於戲場御覽三百三十六太康元年杜預與衆軍會議或曰百年之寇未可盡克方春水生難於久駐杜預傳作今向暑水潦方降疾疫將起宜俟來冬更為大舉通鑑考異晉紀元年四月甲子王渾斬張悌兩寅吳殺岑昏與何楨書庚午送降書壬申濬入石頭甲申封歸命侯五月丁亥至洛陽通鑑考異晉紀二王濟嘗與武帝棊濟伸腳在局下因問皓曰聞君生剝人面皮何也皓曰見人臣無禮於其君者則剝之武子大慚遂縮腳御覽三百七十二元康元年楚王瑋矯詔召三十六軍太康之初吳寇新殄未盈一紀干戈已尋蟣蝨生於甲胄燕雀處於帷幄御覽三百五十五元康四年七月傅咸為司隸五年五月始親職十月卒通鑑考異晉紀四元康五年閏月晉武庫失火漢高祖斬蛇劍穿屋而飛史通諸晉史云異苑稱如此三十國史乃刊為正言元康八年李特就穀入蜀通鑑考異晉紀晉永康元年正月大會有鳩入御坐武帳中拂司空張華之冠初學記二十六永康元年中台星拆張華子韙勸華遜位不從張華善天文解望氣元康初嘗與鄱陽雷孔章其夜登樓而見一氣起牛斗閒華謂孔章曰此何氣也對曰其寶劍乎初學記二十四永康元年孫秀議加趙王倫九錫劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行周勃霍光其功至大不聞有九錫之命倫黨大怒謀害頌頌懼自殺通鑑考異晉紀五二年倫將篡位義陽王威執詔示嵇紹曰聖上法堯舜之舉卿其然乎紹厲聲曰有死而已終不有二威怒拔劍而出及惠帝遷於金墉城唯紹固志不渝從直於金墉絶不通倫時人皆為之懼通鑑考異晉紀齊王冏謀討趙王倫未發會離狐王盛潁川處穆聚衆於濁澤百姓從之日以萬數倫以其將管襲為齊王軍司討盛穆斬之冏因收襲殺之通鑑考異晉紀六永寧元年正月張軌出為涼州刺史以陰淡等為謀主索紞善占夢淡從求占書令狐策夢立冰上與冰下人語索紞曰冰上為陽冰下為陰冰上人與冰下人語為陽請陰媒介事也士如歸妻逮冰未泮君其為人作媒乎策曰老夫耄矣不為媒矣既而太守田約因策為子求張氏女恰至仲春而成婚白帖案此引作崔鴻三十國春秋永寧元年齊王冏輔政辟劉殷為祭酒劉殷字長盛七歲喪其父哀毀逾禮曾祖母王氏盛冬思堇殷入澤中慟哭有堇生得斛餘御覽九百八十永寧元年王蕤王輿謀廢冏事覺八月詔廢蕤為庶人誅輿三族徙蕤於上庸殺之通鑑考異晉紀太安二年正月李特僭位改年通鑑考異晉紀七二年十月成都王穎禦長沙王乂於建春門陸機敗遁走穎誅機及弟雲夷三族機吳人而在寵族之上人多惡之成都王嬖人孟玖素不快於雲及機建春門之敗機衆多喪牽秀譖之於穎言機持兩端孟玖復構之於內使牽秀斬機初機之專征請孫承為後軍司馬至是收承下獄考捶數百兩踝骨見終言機冤吏知承義烈謂承曰二陸之痛誰不知枉君何不愛身承仰天嘆曰陸君兄弟世之奇士有顧於吾吾危不能濟死復相誣非吾徒也乃夷三族承門人費慈自詣穎明承之冤承喻之曰吾惟不負二陸死自吾分卿何為爾耶慈曰僕又安可負君而求生乎固明承冤玖又疾之亦并見害御覽四百二十二年十二月殺長沙王乂通鑑考異晉紀七永興元年成都王穎誅黃門孟玖於是東海王越高密王𥳑皆懼奔國琅琊王睿又將出焉而徼禁甚密穎又先下諸津禁止諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國御覽三百五十九永興元年十月李雄自稱成都王劉淵自稱漢王通鑑考異晉紀永興二年六月李雄即帝位改元大武通鑑考異晉紀八光熙元年東海王越殺河閒王顒同上永嘉四年漢劉聰光興元年氐蒲洪自稱略陽公前秦蒲洪父懷歸為部落小帥其母姜氏因寢産洪驚悸而寤御覽三百六十一永嘉五年蜀王李雄攻譙登於涪城無救援登固守不下士卒皆燻鼠食之一無叛者御覽三百二十永嘉五年成玉衡元年漢嘉平元年漢陷洛陽遷帝於平陽聰以帝為平阿公明年二月乃封帝會稽公通鑑考異晉紀九永嘉六年劉聰引上入宴謂上曰卿為豫章王時朕與王武子相造卿贈朕以柘弓銀硯卿憶否上曰安敢忘之且恨爾日不得早識龍顏初學記二十一王敦謀害王澄而澄衆有二十人持鐵馬鞭為衛同上二十二漢趙置殷衛等州前趙殷州刺史杜廣初為劉景廄卒以馬肥良引為直士侍立通夜未曾休倦景因問之廣流涕申款有章條景執其手曰吾罪人也久負賢者謂妻曰為女求夫不覺廄中有麒麟於是妻之御覽五百十九愍帝愍帝名子業或作業通鑑考異晉紀九建興二年三月癸酉石勒取幽州壬午勒晨王薊通鑑考異晉紀十一建興四年漢麟嘉元年丙寅氶相睿斬都運令史淳于伯於建康於是以刀拭柱血逆流至二丈三尺下四尺五寸其直如絃御覽四百四十六建興四年漢劉聰子約卒漢大將軍東平王約漢王聰戲之曰汝誦何書味何句也約曰臣誦孝經每詠身體髮膚受之父母不敢毀傷至於在上不驕高而不危未嘗不反覆誦之聰大悅御覽六百十元帝建武元年涼遣韓璞伐漢初永嘉中童謠云秦川中血沒腕唯有涼州倚觀郭茂倩樂府八十六李矩降劉陽而襲擊之劉陽少驍猛甚有勇力手曳牛尾卻行百步御覽四百三十六大興元年漢劉曜光初元年漢主聰卒子粲立靳準弒之復殺王延王延九歲喪母行孝有聞後母卜氏御之無道延事彌謹卜常取蒲䖆敗麻與之貯衣延知而不言卜冬月杖之流血令求生魚延扣冰慟哭而得與之卜乃心悟撫之如所生也御覽五百十一大興元年蒲洪降劉曜通鑑考異晉紀十三大興三年涼張茂永元元年後趙石勒二年石勒遣石良率精騎五千掩李矩營生執矩外甥郭誦之弟元教元作書與誦說云去年東平曹嶷西賓猗盧矩如牛角何不歸命勒與誦書餉𪊧尾馬鞭說賓禮賢弟相同斷金往物為信矩所領將士並欲歸勒矩知衆之去己乃率衆來歸御覽三百五十九大興四年王敦令郭璞筮卦曰明公起事禍必不久敦怒曰卿壽幾何曰命盡日中引出斬之璞曰當何之曰南山之首曰我知之矣必在雙柏之閒乎時有鵲巢而甚茂同上九百五十四永昌元年五月王敦殺甘卓甘卓將被誅引鏡不見其頭御覽七百十七明帝太寧元年陳安奔隴城前趙將劉賁馳將追之石虎止賁曰窮寇歸兵不可迫也我士卒連勝皆已怠矣以驕急之卒當致死之衆恐無萬全之利賁曰不然彼鋭氣盡矣衆心乖阻人懷苟免莫有鬭志我卒乘猛氣甚盛皆一當十豈其衰沮之餘所能抗也賁躬先士卒戰輒敗之遂圍安於隴城御覽二百九十九成帝晉咸和二年溫嶠與陶侃起義兵伐蘇峻帥師四萬直指石頭侃泊加子洲御覽六十九三年峻兵犯闕蘇峻作逆領軍卞壼以王師敗績遂單騎赴難二子昣旴隨之俱歿母裴氏撫尸而哭曰父為忠臣子為孝子夫何恨乎徵士翟湯聞之歎曰父死於前子歿於後忠孝之道萃於一門可謂賢矣御覽五百十一溫嶠等入討峻遷帝於石頭殷羡之勸趨石頭光祿勳殷羡之還豫辛貴游多憑寄書羡之至板橋投書於江曰沉者自沉浮者自浮殷洪喬不能作致書郵初學記六咸和五年趙建平元年江州刺史劉胤自武昌以有疾被徵為右將軍而王舒未至猶在盆口後將軍郭默旋而過胤不禮之臘曰遺默酒五升㹠一頭默大怒投之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者胤獨與其妾寢默至斬於床下及其司馬張滿參軍荀楷李纂慠默故也御覽三十三咸和九年以庾亮都督江荊等州王隱始成晉書合八十八卷家貧無紙未成其志遂南遊投陶侃於荊州又江州投庾亮乃獲其紙墨始書就焉初學記二十一咸和九年石虎即位改元永熙通鑑考異晉紀十七咸康三年石虎僭稱趙天王趙成公段作庭燎於杠末上盤置燎下盤置人咸康三年正月趙夔安等上尊號庭燎油灌下盤死者二十餘人趙王虎惡之腰斬成公段通鑑考異晉紀十七康帝闕穆帝永和元年趙造獵車千乘石季龍將獵輒冠金鏤之帽御覽六百八十七永和二年九月燕殺慕容翰通鑑考異晉紀十永和三年趙將麻秋命黑槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乘馬艾不從乃下踞胡床而麾衆趙人以為有伏懼而不進御覽四百三十六永和五年趙以謫卒高力等戍涼州定陽人梁犢因民心怨趙也謀兵東還犢自稱大將軍率衆攻下辦剋之犢軍人皆多力善射一當十餘雖無甲兵所在略百姓大斧施一丈柯攻戰若神擬向崩潰御覽二百九十九永和六年閏正月通鑑考異晉紀二十三月趙新興王祇即皇帝位同上永和八年燕慕容俊元璽元秦主苻健皇始二年並稱帝姚襄來歸姚襄南至滎陽與高昌李歷戰於麻田馬中流矢死弟萇下馬授襄曰汝何以自免萇曰但令兄濟此豎子何敢害萇會救至俱不死御覽三百二十五姚萇單騎度淮見豫州刺史謝尚於壽陽幅巾以待之一面如舊相識御覽四百八永和十年涼張祚和平元年僞前梁張重華在梁州欲誅西河張祚祚廄馬數十匹同時皆無尾未幾祚遇禍李冗獨異志下升平四年燕主暐建熙元年朝廷聞慕容俊死曰中原可圖矣桓溫曰慕容恪在其憂方大史通摸擬哀帝帝奕太和六年十一月被廢桓溫使劉享收帝璽綬通鑑考異晉紀二十五𥳑文帝闕孝武帝太元元年涼亡涼天水太守史稜暴疾死五日而蘇云見涼光殿皆生白瓜及秦使梁熙滅涼小字白瓜也事類賦注二十七太元二年秦平諸國後示人以侈置左右鎮郎及拂蓋郎申香為拂蓋郎長一丈九尺初學記十九秦王苻堅懸珠簾於正殿以朝群臣宮宇服御物極珍飾之奇尚書金部郎裴元略諫曰願陛下遵采椽之不斫鄙瓊室而不居堅笑曰非卿之忠朕何由聞過乎御覽四百五十六太元四年秦以苻洛為益州牧苻洛雄勇多力猛氣絶人坐制奔牛射洞犂耳苻堅深憚之故常為邊守御覽四百三十六太元八年秦大舉入寇秦王堅下書曰吳人敢恃江山僭稱大號輕率犬羊屢窺王境朕將巡狩省方登會稽而朝諸侯復禹績而定九州今王師所擬必有征無戰伐國存君義同一體御覽三百二十二太元九年燕慕容垂元年後秦姚萇白雀元年慕容垂攻鄴苻丕遣其從弟就請救乃遺謝玄青銅鏡黃金婉轉繩等以之為信初學記二十五御覽七百十七太元十七年以殷仲堪為荊州刺史晉黃門郎殷仲堪遊於江濱見流棺於水乃接焉旬日之中前門之溝忽起為岸是夕有人通夢於仲堪自稱徐伯感君之惠無以報仲堪因問門岸為何祥乎對曰水中之岸其名為洲君將為洲也言終而沒御覽五百五十一太元二十一年燕慕容寶永康元年魏皇始元年涼呂光龍飛元年後燕慕容垂遣其子寶步騎七萬伐後魏戰於參合陂大敗寶以數千騎奔免士衆還者十一二寶恨參合之敗屢言魏有可乘之機由是自率大衆伐魏至參合見往年戰處積骸如山設弔祭之禮死者父兄一時號哭軍中皆慟垂慚憤嘔血因而寢疾卻還道卒御覽三百二十三安帝隆安元年南涼禿髮烏孤太初元年北涼段業神璽元年烏孤稱西平王後涼禿髮烏孤七世祖壽闐之在孕也母夢一老父被髮左衽乘白馬謂曰爾夫雖西移終當東歸至京必生貴男長為人主言終胎動而寤後因寢生壽闐被中因以禿髮為號壽闐為名御覽三百六十一涼沮渠蒙遜叛據金山沮渠蒙遜其先世為胸奴左沮渠因以官為氏少牧羊臥息田畔忽見沙門以手摩其頭曰爾後當王此土不久苦焉言終而滅同上八百三十六隆安二年燕慕容盛建平元魏天興元年慕容德元年燕蘭汗弒寶盛子太原王奇起兵於外燕金紫光祿大夫高平公歆初歆伯父左光祿大夫熙拊歆首而告之曰汝儀容偉茂志節果當有佐命之功顯吾門者必汝也御覽五百十二隆安三年燕長樂元年秦弘始元年涼呂纂咸寧元年南燕慕容德傳檄青州燕徵其東萊太守王鸞鸞身長九尺腰帶十圍貫甲跨馬不據鞍由鐙燕王德見而奇其魁偉賜之食一進一斛餘德驚曰所噉如此非耕而能飽但才貌不凡堪為貴人可以一縣試之繇是拜逢陵長甚有治績御覽三百七十七隆安四年南燕建平南涼禿髮利鹿建和元年西涼李皓庚子元年涼州人胡安據盜發掠州人張駿墓見駿貌如生得赤玉簫紫玉笛初學記十六涼州胡安據盜發張駿墓得珊瑚馬鞭馬瑙鍾黃金勒御覽三百五十八十一月北涼李皓自稱涼公燉煌太守李皓表于段業皓稱盡忠不二橫為李嗣所讒請業殺嗣皓自歸司敗業乃殺嗣遣使謝皓初嗣與皓結刎頸之交嗣常以宗族託皓曰我身猶子身勿為疑也及是皓反為嗣所構皓乃恨之御覽四百八隆安五年燕慕容熙光始元年涼呂隆神鼎元年北涼沮渠蒙遜永安元年後梁呂超殺其君纂后楊氏國色超將妻之謂其父恆曰后若自殺禍必及宗恆以此言告后后曰大人本賣女與氐羌以圖富貴一之以甚甚可再乎恆不能彊乃自殺御覽三百八十李皓於南門外臨水起堂名曰靖恭堂以議朝政閲武事堂成圖讚自古明王忠臣孝子貞女皓自為序以明鑒戒文武群僚亦皆圖焉是月白雀翔於靖恭堂皓頌之御覽百七十六案此引三十國春秋西涼傳元興三年王謐與衆議推劉裕領揚州裕辭乃以謐為侍中領揚州初裕名位微薄盛流不知謐獨奇之裕嘗與刁逵摴蒲輸直逵縳之馬柳謐代還之由是德謐蕭方等曰夫蛟龍潛伏魚蝦褻之是以漢高赦雍齒魏武免梁鵠安可以布衣之嫌而成萬乘之隙哉今王謐為公刁逵亡族酬恩報怨何其狹哉通鑑晉紀考異三十五義熙元年盧循為廣州刺史循遺劉裕益智粽裕乃答以續命湯御覽九百七十二引作十三國春秋類聚八十七引作三十六國春秋高句驪以千里馬生羆皮障泥獻於南燕燕王超大悅答以水牛能言鳥御覽三百五十九義熙三年燕高雲正始元年夏赫連勃勃龍升元年燕王熙后苻氏卒徒跣送葬馮跋拒而弒之立雲燕王慕容熙后苻氏嘗季夏思凍魚膾仲冬須生地黃皆下有司切責之不得加之以辟焉御覽二十一義熙五年魏拓跋嗣永興元年燕馮跋太平元年西秦更始元年劉裕攻南燕得燕人張綱治攻具既成設飛橋懸梯被以牛皮火石不能害攻城之士得肆力焉御覽三百三十六義熙六年丁亥中軍劉裕悉衆攻燕衆咸諫曰今往亡日兵家所忌裕曰我往彼亡吉孰大焉乃命悉登遂剋之燕王慕容超走追獲焉裕責以不降之罪超神色自若無餘言唯以母託劉敬宣而已蕭方等曰美哉其言也言必己親終不忘孝可謂人之將死其言也善信乎御覽三百二十六徐道覆聞劉裕北伐勸盧循襲建康盧循寇京邑芙蓉艦千餘艘初學記二十五朝廷急徵裕裕引兵還劉裕次山陽聞何無怨敗績卷甲兼行將濟江而風急衆咸難之裕曰若有天命風當自息如其天不助舟覆溺何足可怪即命登舟舟移而風止御覽六十義熙七年以劉裕為太尉中書監裕既拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容裕甚不平乃謂之曰何謂旁若無人混對曰明公將隆伊周之化方使四海解襟謝混何人而敢獨異乎乃易手板披撥其襟領悉皆解散裕大悅御覽四百六十四義熙八年西秦乞伏熾磐永康元年北涼玄始元年劉毅為荊州請從弟藩以自副劉裕以詔書罪狀毅與藩及謝混共謀不軌賜藩混死帥師襲荊州殺毅安帝時以劉鎮之為散騎常侍光祿大夫不受鎮之毅季父義熙初謂毅及藩曰汝輩才力勢運足以得志當身爭耳我不就汝求位求財又不受汝罪纍每見毅等道從吏卒到門輒罵詬之毅甚敬畏每未至宅數百步止與白衣數人而進儀衛悉不自隨及至毅敗無不服其先見而劉裕甚敬遇之御覽五百十二晉義熙九年夏鳳翔元年盜發故驃騎將軍卞壼墓剖棺掠之壼尸面如生兩手悉拳爪生達背御覽五百五十七義熙十一年二月姚興卒通鑑考異晉紀三十九義熙十三年西涼李歆嘉興元年秋七月太尉裕克秦入長安王鎮惡隨宋高祖入關中初鎮惡流寓崤澠崤澠人李方厚待之鎮惡曰待吾佇英雄主取萬戶侯乃厚相報方笑曰本縣足矣鎮惡力不絶人不間弓馬略通諸子兵書縱棋有智計以此成名及是李方尚在鎮惡升堂拜母拔方澠池令御覽四百八晉安帝時郭逸妻以大竹杖打逸前妻之子子死妻因棄市如常刑御覽五百十一恭帝元熙元年夏王勃勃自號真興元年夏刻石都南頌其功德曰我皇誕命世之期應天縱之德仰協時來俯從民望屬姦豪鼎峙之際群凶嶽立之秋故運籌命將舉無遺策親御六戎即有征無戰五稔之閒而治風宏闡矣御覽三百二十二元熙二年西秦乞伏熾盤建弘元年西涼李恂永建元年西淳從事中郎將張顯言於涼王曰太祖以天挺神姿應桓文之運流𣿖萬里為西夏所推平西域兵不血刃取酒泉有易俯拾為殿下開創崇規貽厥孫謀者也御覽三百二十二
